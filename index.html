<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Realistic GitHub Explorer 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 15px; font-family: sans-serif; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <b>3D Explorer</b><br>WASD - Move | SPACE - Jump<br>
        <span style="color: #0f0;">Click Screen to Start Music</span>
    </div>
    
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- REALISTIC LIGHTING ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(hemiLight);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // --- REALISTIC GROUND (Grass & Texture) ---
        const textureLoader = new THREE.TextureLoader();
        // Standard CDN textures for realism
        const grassTexture = textureLoader.load('https://threejs.org');
        grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping;
        grassTexture.repeat.set(25, 25);

        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- ADDING ROCKS & SCENERY ---
        function addRock(x, z) {
            const size = Math.random() * 1.5 + 0.5;
            const geo = new THREE.DodecahedronGeometry(size, 0);
            const mat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
            const rock = new THREE.Mesh(geo, mat);
            rock.position.set(x, size * 0.4, z);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            rock.castShadow = rock.receiveShadow = true;
            scene.add(rock);
        }

        for(let i=0; i<30; i++) addRock(Math.random()*100-50, Math.random()*100-50);

        // --- PLAYER & PHYSICS ---
        const player = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        player.position.y = 2;
        player.castShadow = true;
        scene.add(player);

        let velocityY = 0, isGrounded = false;
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- AUDIO ENGINE ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load('melodigne-symphony-of-legends-192455.ogg', (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(0.5);
        });
        window.addEventListener('mousedown', () => { if (!sound.isPlaying && sound.buffer) sound.play(); });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const speed = 0.15;
            if(keys['KeyW']) player.position.z -= speed;
            if(keys['KeyS']) player.position.z += speed;
            if(keys['KeyA']) player.position.x -= speed;
            if(keys['KeyD']) player.position.x += speed;

            velocityY -= 0.015; // Gravity
            player.position.y += velocityY;
            if(player.position.y <= 0.9) {
                player.position.y = 0.9;
                velocityY = 0;
                isGrounded = true;
            } else isGrounded = false;
            if(keys['Space'] && isGrounded) velocityY = 0.35;

            camera.position.set(player.position.x, player.position.y + 2.5, player.position.z + 6);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
